services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: maanaim
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      PGHOST: db
      PGUSER: postgres
      PGPASSWORD: ${DB_PASSWORD}
      PGDATABASE: maanaim
      PGPORT: 5432
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
